<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMHL 4v4 - 28-0 Challenge</title>
  <style>
    :root {
      --primary: #00ccff;
      --bg: #0a0a1f;
      --card: #112233;
    }
    body {
      font-family: 'Arial', sans-serif;
      background: var(--bg);
      color: #ddd;
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .header { text-align: center; margin-bottom: 25px; }
    h1 {
      color: var(--primary);
      font-size: 2.8em;
      margin: 0;
      text-shadow: 0 0 15px rgba(0, 204, 255, 0.5);
    }
    .container {
      display: flex;
      gap: 25px;
      max-width: 1400px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }
    .main {
      flex: 1;
      min-width: 380px;
      max-width: 520px;
    }
    .roster-container {
      max-height: 65vh;
      overflow-y: auto;
      padding-right: 10px;
      scrollbar-width: thin;
      scrollbar-color: #00ccff #223344;
    }
    .player {
      background: #223344;
      margin: 8px 0;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #00ccff22;
      transition: all 0.2s;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .player:hover {
      border-color: var(--primary);
      box-shadow: 0 0 12px rgba(0, 204, 255, 0.4);
      transform: translateX(5px);
    }
    .player img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: 3px solid #00ccff;
      object-fit: cover;
    }
    .sidebar {
      background: var(--card);
      padding: 25px;
      border-radius: 16px;
      border: 2px solid #00ccff33;
      width: 340px;
      height: fit-content;
    }
    .lines-container {
      width: 460px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .line {
      background: #1a2233;
      padding: 20px;
      border-radius: 16px;
      border: 2px solid #00ccff44;
    }
    .line h3 {
      color: var(--primary);
      margin: 0 0 18px 0;
      text-align: center;
    }
    .formation {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .slot {
      width: 130px;
      background: #223344;
      border: 2px dashed #00ccff44;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      transition: all 0.2s;
    }
    .slot.filled {
      border-style: solid;
      border-color: #00ffcc;
      background: #1f2a44;
    }
    .slot .pos {
      color: #00ffcc;
      font-size: 0.95em;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .slot img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid #00ccff;
      object-fit: cover;
      margin-bottom: 6px;
    }
    button {
      padding: 14px 28px;
      font-size: 18px;
      background: var(--primary);
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 8px 4px;
      transition: 0.2s;
    }
    button:hover { background: #00ffcc; }
    button:disabled { background: #555; cursor: not-allowed; }
    #spinResult {
      font-size: 1.4em;
      min-height: 110px;
      margin: 15px 0;
      padding: 16px;
      background: #1a2233;
      border-radius: 12px;
      border-left: 6px solid var(--primary);
      text-align: center;
      transition: all 0.2s ease;
      font-family: monospace;
    }
    @keyframes pop {
      0% { transform: scale(0.6); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: #112233;
      padding: 25px;
      border-radius: 16px;
      border: 2px solid var(--primary);
      max-width: 500px;
      text-align: center;
    }
    .stats {
      font-size: 0.85em;
      color: #00ffcc;
      margin-top: 4px;
      line-height: 1.3;
    }
    .stats.playoff-stats {
      color: #ffd700;
    }
    .sidebar-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 4px;
      font-size: 12.5px;
      background: #1a2233;
      color: #888;
      font-weight: bold;
      border: 2px solid #00ccff22;
      border-radius: 8px;
      cursor: pointer;
      margin: 0;
      transition: 0.2s;
    }
    .tab-btn:hover { background: #223344; color: #ddd; }
    .tab-btn.active {
      background: var(--primary);
      color: black;
      border-color: var(--primary);
    }

    .standings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82em;
    }
    .standings-table th {
      color: var(--primary);
      text-align: center;
      padding: 6px 4px;
      border-bottom: 2px solid #00ccff44;
      font-size: 0.95em;
    }
    .standings-table th:first-child { text-align: left; }
    .standings-table td {
      text-align: center;
      padding: 7px 4px;
      border-bottom: 1px solid #223344;
    }
    .standings-table td:first-child {
      text-align: left;
      font-weight: bold;
    }
    .standings-table tr.you-row {
      background: rgba(0, 204, 255, 0.15);
    }
    .standings-table tr.you-row td:first-child { color: #ffd700; }
    .standings-table tr.clinched td:first-child::after {
      content: " ✓";
      color: #00ffcc;
    }
    .rank-cell {
      color: #888;
      width: 22px;
    }
    .sort-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 14px 0;
    }
    .sort-label {
      color: #888;
      font-size: 0.85em;
      margin-right: 2px;
    }
    .sort-btn {
      padding: 5px 12px;
      font-size: 0.8em;
      background: #1a2233;
      color: #999;
      font-weight: normal;
      border: 1px solid #00ccff33;
      border-radius: 14px;
      cursor: pointer;
      margin: 0;
      transition: 0.15s;
    }
    .sort-btn:hover { background: #223344; color: #ddd; }
    .sort-btn.active {
      background: var(--primary);
      color: black;
      border-color: var(--primary);
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏒 BMHL 4v4 - 28-0 CHALLENGE 🏒</h1>
    <h2 id="teamNameDisplay" style="color:#00ccff;">Your Dynasty</h2>
  </div>

  <div class="container">
    <div class="main">
      <input type="text" id="teamNameInput" placeholder="Enter your team name" style="padding:12px; width:90%; font-size:16px; margin-bottom:10px;">
      <button onclick="setTeamName()">Set Team Name</button>
      <button onclick="clearRoster()" style="background:#c00;">Clear Roster</button>
      <button onclick="autoBestLineup()">⭐ Best Lineup</button><br><br>
    
      <button id="spinBtn" onclick="spin()">🎰 SPIN FOR PLAYER</button>
      <button onclick="simulateSeason()">🏒 SIMULATE 28 GAME SEASON</button>
      <button id="playoffsBtn" onclick="simulatePlayoffs()" style="display:none; background:#ffd700;">🏆 SIMULATE PLAYOFFS</button>
      <button onclick="shareTeam()">🔗 Share Team</button>
      <button onclick="showLoadModal()">📥 Load Team</button>
    
      <div id="spinResult"></div>
    
      <div class="roster-container">
        <div id="team"></div>
      </div>
    </div>

    <div class="lines-container">
      <div class="line" id="line1">
        <h3>🔥 LINE 1 (4 Players)</h3>
        <div class="formation" id="line1-formation"></div>
      </div>
      <div class="line" id="line2">
        <h3>🔥 LINE 2 (4 Players)</h3>
        <div class="formation" id="line2-formation"></div>
      </div>
      <div class="line" id="goalies">
        <h3>🥅 GOALIES (2)</h3>
        <div class="formation" id="goalies-formation"></div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tabBtnTeam" onclick="switchSidebarTab('team')">📊 Your Team</button>
        <button class="tab-btn" id="tabBtnStandings" onclick="switchSidebarTab('standings')">🏆 Standings</button>
      </div>
      <div id="seasonResults" style="color:#aaa; line-height:1.6;">
        Build your roster and simulate the season!
      </div>
      <div id="standingsResults" style="color:#aaa; line-height:1.6; display:none;">
        Simulate a season to generate league standings!
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="assignModal" class="modal">
    <div class="modal-content">
      <h3 id="modalPlayerName" style="color:var(--primary);"></h3>
      <div id="slotOptions" style="display:flex; flex-direction:column; gap:8px; margin:20px 0;"></div>
      <button onclick="closeModal()" style="background:#555;">Cancel</button>
    </div>
  </div>

  <div id="shareModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary);">🔗 Share Your Team</h3>
      <textarea id="shareCode" readonly style="width:100%; height:140px; background:#000; color:#0f0; font-family:monospace; padding:10px;"></textarea>
      <button onclick="copyShareCode()">📋 Copy Code</button>
      <button onclick="closeShareModal()" style="background:#555;">Close</button>
    </div>
  </div>

  <div id="loadModal" class="modal">
    <div class="modal-content">
      <h3 style="color:var(--primary);">📥 Load Team</h3>
      <textarea id="loadCode" placeholder="Paste share code here..." style="width:100%; height:140px; background:#000; color:#0f0; font-family:monospace; padding:10px;"></textarea>
      <button onclick="loadTeam()">✅ Load Team</button>
      <button onclick="closeLoadModal()" style="background:#555;">Cancel</button>
    </div>
  </div>

// Compact "🏆" prefixed playoff stat line for a player, or '' if they have
// no recorded playoff stats yet (no playoffs simulated, or didn't see action).
function formatPlayoffStatLine(player) {
  if (!playoffStats) return '';
  const stats = playoffStats[player.name];
  if (!stats) return '';
  if (["G","GK"].includes(player.position)) {
    if (!stats.gamesStarted) return '';
    const svPct = (stats.saves + stats.gaPlayoffs) > 0 ? ((stats.saves / (stats.saves + stats.gaPlayoffs)) * 100).toFixed(1) : "0.0";
    return `<div class="stats playoff-stats">🏆 ${stats.wins}-${stats.losses} • ${stats.saves} SV • ${svPct}% SV%${stats.shutouts ? ` • ${stats.shutouts} SO` : ''}</div>`;
  } else {
    if (stats.points === 0) return '';
    return `<div class="stats playoff-stats">🏆 ${stats.goals}G ${stats.assists}A (${stats.points} pts)</div>`;
  }
}

function countAssignedByType() {
  let forwards = 0, defenders = 0, goalies = 0;
  Object.values(lines).flat().forEach(p => {
    if (!p) return;
    if (["LW","RW","FWD","C"].includes(p.position)) forwards++;
    else if (["D","LD","RD"].includes(p.position)) defenders++;
    else if (["G","GK"].includes(p.position)) goalies++;
  });
  return { forwards, defenders, goalies };
}

function calculateTeamStrength() {
  let total = 0, count = 0;
  Object.values(lines).flat().forEach(p => {
    if (p) {
      const mult = (["G","GK"].includes(p.position)) ? 1.25 :
                   (lines.line1 || []).some(lp => lp && lp.name === p.name) ? 1.35 : 1.1;
      total += p.rating * mult;
      count++;
    }
  });
  return count > 0 ? Math.round(total / count) : 75;
}

function autoBestLineup() {
  if (myTeam.length < 6) return alert("Need at least 6 players for a full lineup!");
  lines = { line1: [], line2: [], goalies: [] };
  let goaliesList = myTeam.filter(p => ["G","GK"].includes(p.position)).sort((a,b) => b.rating - a.rating);
  let defendersList = myTeam.filter(p => ["D","LD","RD"].includes(p.position)).sort((a,b) => b.rating - a.rating);
  let forwardsList = myTeam.filter(p => ["LW","RW","FWD","C"].includes(p.position)).sort((a,b) => b.rating - a.rating);
  lines.goalies = goaliesList.slice(0, 2);
  lines.line1 = [forwardsList[0], forwardsList[1], forwardsList[2], defendersList[0]].filter(Boolean);
  lines.line2 = [forwardsList[3]||forwardsList[0], forwardsList[4]||forwardsList[1], forwardsList[5]||forwardsList[2], defendersList[1]||defendersList[0]].filter(Boolean);

  alert("⭐ Best Lineup automatically assigned!");
}

// ================== SPIN ==================
function spin() {
  if (myTeam.length >= ROSTER_MAX) return alert("Roster is full (10 players)!");

  const btn = document.getElementById("spinBtn");
  const resultDiv = document.getElementById("spinResult");
  const draftedNames = new Set(myTeam.map(p => p.name));
  let available = playersPool.filter(p => !draftedNames.has(p.name));
  if (available.length === 0) return alert("No players left!");

  const counts = countAssignedByType();
  const needsForward = counts.forwards < MAX_FORWARDS;
  const needsDefender = counts.defenders < MAX_DEFENDERS;
  const needsGoalie = counts.goalies < MAX_GOALIES;

  if (!needsForward) available = available.filter(p => !["LW","RW","FWD","C"].includes(p.position));
  if (!needsDefender) available = available.filter(p => !["D","LD","RD"].includes(p.position));
  if (!needsGoalie) available = available.filter(p => !["G","GK"].includes(p.position));

  let finalPool = available;
  const neededCount = [needsForward, needsDefender, needsGoalie].filter(x => x).length;
  if (neededCount === 1) {
    if (needsForward) finalPool = available.filter(p => ["LW","RW","FWD","C"].includes(p.position));
    else if (needsDefender) finalPool = available.filter(p => ["D","LD","RD"].includes(p.position));
    else if (needsGoalie) finalPool = available.filter(p => ["G","GK"].includes(p.position));
  }
  if (finalPool.length === 0) finalPool = available;

  // Pick 3 unique random players
  const shuffled = finalPool.sort(() => Math.random() - 0.5);
  const options = shuffled.slice(0, Math.min(3, shuffled.length));

  btn.disabled = true;
  btn.textContent = "🎰 SPINNING...";

  let spinCount = 0;
  const maxSpins = 32;

  spinInterval = setInterval(() => {
    spinCount++;
    const randomPlayer = finalPool[Math.floor(Math.random() * finalPool.length)];
    resultDiv.innerHTML = `
      <span style="opacity:0.7;">🎰 SPINNING...</span><br><br>
      <strong style="font-size:1.7em;">${getDisplayName(randomPlayer)}</strong><br>
      <span style="color:#00ffcc;">${randomPlayer.position} • ${randomPlayer.rating} OVR</span>
    `;

    if (spinCount >= maxSpins) {
      clearInterval(spinInterval);

      let html = `<div style="color:#ffd700; font-size:1.1em; margin-bottom:12px;">🎰 Pick one:</div>`;
      html += `<div style="display:flex; flex-direction:column; gap:8px;">`;
      options.forEach((player, i) => {
        html += `
          <div onclick="draftPlayer(${playersPool.indexOf(player)})" style="
            background:#1f2a44; border:2px solid #00ccff44; border-radius:10px;
            padding:10px 14px; cursor:pointer; display:flex; align-items:center; gap:12px;
            transition:all 0.2s;" 
            onmouseover="this.style.borderColor='#00ffcc'; this.style.background='#253550';"
            onmouseout="this.style.borderColor='#00ccff44'; this.style.background='#1f2a44';">
            <img src="${player.image}" onerror="this.src='https://via.placeholder.com/44/00ccff/000?text=${player.name[0]}'"
              style="width:44px; height:44px; border-radius:50%; border:2px solid #00ccff; object-fit:cover;">
            <div style="text-align:left;">
              <strong style="font-size:1.05em;">${getDisplayName(player)}</strong><br>
              <span style="color:#00ffcc;">${player.position} • ${player.rating} OVR</span><br>
              <small style="color:#aaa;">${player.team}</small>
            </div>
          </div>`;
      });
      html += `</div>`;
      if (respinAvailable) {
        html += `<br><button onclick="respin()" style="background:#ff9900; font-size:14px; padding:10px 20px;">🔄 RESPIN (1 left)</button>`;
      } else {
        html += `<br><span style="color:#666; font-size:0.85em;">No respins remaining</span>`;
      }
      resultDiv.innerHTML = html;
      btn.disabled = false;
      btn.textContent = "🎰 SPIN FOR PLAYER";
    }
  }, 55);
}

function respin() {

function draftPlayer(poolIndex) {
  const player = playersPool[poolIndex];
  if (!player) return;
  if (myTeam.some(p => p.name === player.name)) return alert("Already on your team!");
  myTeam.push(player);
  // do NOT reset respinAvailable here — only 1 respin for the whole draft
  document.getElementById("spinResult").innerHTML = `

    <span style="color:#00ffcc;">${player.position} • ${player.rating} OVR</span><br>
    <small>from ${player.team}</small>
  `;
  renderRoster();
}

// ================== REALISTIC STATS ==================
// Goals scale tightly with rating. A 99 OVR scores ~35-42, a 70 OVR scores ~4-9.
// Small random variance (±3 goals) so ratings matter more than luck.
function skaterStats(rating) {
  let min, max;
  if (rating >= 99)       { min = 40; max = 50; }
  else if (rating >= 90)  { min = 30; max = 40; }
  else if (rating >= 85)  { min = 20; max = 30; }
  else                    { min = 10; max = 20; }
  const points = Math.floor(Math.random() * (max - min + 1)) + min;
  // Split points: roughly 40% goals, 60% assists
  const goals = Math.round(points * (0.35 + Math.random() * 0.1));
  const assists = points - goals;
  return { goals, assists, points };
}

function generateSeasonStats() {
  seasonStats = {};
  const allPlayers = Object.values(lines).flat().filter(Boolean);

  allPlayers.forEach(player => {
    const isGoalie = ["G","GK"].includes(player.position);
    if (isGoalie) {
      // Higher rated goalies get better save % and lower GAA
      const svBase = 88 + (player.rating - 80) * 0.15;
      const svVariance = (Math.random() * 2) - 1; // ±1%
      const svPct = Math.min(97, Math.max(84, svBase + svVariance)).toFixed(1);
      const shutouts = Math.floor((player.rating - 78) / 4 + Math.random() * 2);
      const gaaBase = 3.5 - (player.rating - 80) * 0.06;
      const gaaVariance = (Math.random() * 0.6) - 0.3;
      const gaa = Math.max(1.2, gaaBase + gaaVariance).toFixed(2);
      seasonStats[player.name] = { svPct, shutouts: Math.max(0, shutouts), gaa };
    } else {
      const { goals, assists, points } = skaterStats(player.rating);
      seasonStats[player.name] = { goals, assists, points };
    }
  });
}

function simulateSeason() {
  if (myTeam.length < 10) {
    return alert(`You need a full 10-player roster before simulating! (${myTeam.length}/10 players)`);
  }
  if (lines.line1.length + lines.line2.length + lines.goalies.length < 6) {
    return alert("Assign more players to lines first!");
  }
  generateSeasonStats();
  playoffStats = null; // clear any prior playoff run — it belonged to the old season
  const strength = calculateTeamStrength();
  const ovr = teamOverall();
  let wins = 0, losses = 0, gf = 0, ga = 0;

  // Get skaters for goal scoring
  const skaters = Object.values(lines).flat().filter(p => p && !["G","GK"].includes(p.position));

  // Goalies split starts across the season, weighted toward the better-rated
  // one (a clear "starter" gets more games, like a real team).
  const goalies = (lines.goalies || []).filter(Boolean);
  goalies.forEach(g => {
    seasonStats[g.name] = { ...seasonStats[g.name], wins: 0, losses: 0, saves: 0 };
  });
  function pickStartingGoalie() {
    if (goalies.length === 0) return null;
    if (goalies.length === 1) return goalies[0];
    const [g1, g2] = goalies;
    const ratingGap = g1.rating - g2.rating;
    // Starter gets ~60-80% of starts depending on how much better they are
    const g1StartChance = Math.min(0.85, Math.max(0.5, 0.65 + ratingGap * 0.015));
    return Math.random() < g1StartChance ? g1 : g2;
  }

  // Build weighted scorer pool based on rating
  function pickScorer() {
    const weights = skaters.map(p => p.rating - 60);
    const total = weights.reduce((a, b) => a + b, 0);
    let rand = Math.random() * total;
    for (let i = 0; i < skaters.length; i++) {
      rand -= weights[i];
      if (rand <= 0) return skaters[i].name.toLowerCase();
    }
    return skaters[skaters.length - 1].name.toLowerCase();
  }

  let gameLog = '';

  for (let game = 1; game <= 28; game++) {
    let isWin;
    if (ovr >= 93) {
      isWin = true;
    } else if (ovr >= 90) {
      isWin = Math.random() * 100 < 85;
    } else {
      const opponentStrength = 82 + Math.floor(Math.random() * 17);
      const winChance = (strength - opponentStrength) * 1.2 + 42;
      isWin = Math.random() * 100 < winChance;
    }

    const gameGF = isWin ? Math.floor(Math.random() * 4) + 2 : Math.floor(Math.random() * 3) + 1;
    const gameGA = isWin ? Math.max(0, gameGF - Math.floor(Math.random() * 2) - 1) : gameGF + Math.floor(Math.random() * 2) + 1;

    if (isWin) wins++; else losses++;
    gf += gameGF;
    ga += gameGA;

    // Credit the starting goalie with the decision and tally their saves.
    // Shots faced is goals-against plus a realistic save haul (~20-35 saves/game).
    const startingGoalie = pickStartingGoalie();
    if (startingGoalie) {
      const stats = seasonStats[startingGoalie.name];
      if (isWin) stats.wins++; else stats.losses++;
      const savesThisGame = Math.floor(Math.random() * 16) + 20; // 20-35 saves
      stats.saves += savesThisGame;
    }

    // Pick goal scorers, tracking goal counts per player this game
    const scorerCounts = {};
    for (let g = 0; g < gameGF; g++) {
      const name = pickScorer();
      scorerCounts[name] = (scorerCounts[name] || 0) + 1;
    }
    const scorerStr = Object.entries(scorerCounts)
      .map(([name, count]) => count > 1 ? `${name} (${count})` : name)
      .join(', ');

    const color = isWin ? '#00ffcc' : '#ff6666';
    const icon = isWin ? '✅' : '❌';
    gameLog += `<div style="margin:3px 0; font-size:0.82em;">
      ${icon} <strong style="color:${color};">G${game}: ${gameGF}-${gameGA}</strong>
      <span style="color:#aaa;"> — ${scorerStr}</span>
    </div>`;
  }

  const winPct = ((wins / 28) * 100).toFixed(1);
  const points = wins * 2;
  const summary = wins === 28 ? "🏆 28-0! PERFECT SEASON! LEGENDARY!" : wins >= 22 ? "🔥 LEGENDARY SEASON!" : wins >= 18 ? "🔥 Championship Contenders!" : wins >= 14 ? "✅ Strong Season" : wins >= 10 ? "📈 Decent Year" : "📉 Rebuilding Year";

  let html = `
    <strong style="color:#ffd700; font-size:1.3em;">${teamName}</strong><br><br>
    Record: <strong>${wins} - ${losses}</strong><br>
    Win %: <strong>${winPct}%</strong> | Points: <strong>${points}</strong><br>
    GF: ${gf} | GA: ${ga} | Diff: <strong>${gf - ga}</strong><br><br>
    <span style="color:#00ffcc;">${summary}</span><br><br>
  `;

  const topSkaters = Object.keys(seasonStats)
    .filter(name => { const p = myTeam.find(pl => pl.name === name); return p && !["G","GK"].includes(p.position); })
    .map(name => ({ name, ...seasonStats[name] }))
    .sort((a, b) => b.points - a.points)
    .slice(0, 4);

  html += `<strong>Top Scorers:</strong><br>`;
  topSkaters.forEach(s => html += `${s.name}: <strong>${s.goals}G ${s.assists}A</strong> (${s.points} pts)<br>`);

  html += `<br><strong>Goalies:</strong><br>`;
  const goaliesList = Object.keys(seasonStats)
    .filter(name => { const p = myTeam.find(pl => pl.name === name); return p && ["G","GK"].includes(p.position); })
    .map(name => ({ name, ...seasonStats[name] }));
  goaliesList.forEach(g => html += `${g.name}: <strong>${g.wins ?? 0}-${g.losses ?? 0}</strong> • ${g.saves ?? 0} Saves • ${g.svPct}% SV% • ${g.shutouts} SO • ${g.gaa} GAA<br>`);

  html += `<br><strong>📋 Game Log:</strong><br><div style="max-height:300px; overflow-y:auto; background:#0d1a2a; padding:10px; border-radius:8px; border:1px solid #00ccff22;">${gameLog}</div>`;

  document.getElementById("seasonResults").innerHTML = html;
  document.getElementById("playoffsBtn").style.display = "inline-block";
  renderRoster();
  renderLines();

  // Build league-wide standings using the same win/loss record we just generated for you
  simulateLeagueStandings({ wins, losses, gf, ga });
  switchSidebarTab('standings');
}

// ================== LEAGUE STANDINGS SIMULATION ==================
// Simulates the 7 rival teams' 28-game seasons using their fixed strength
// ratings, then assembles a full league table including your team's
// already-simulated record.
function simulateLeagueStandings(yourRecord) {
  const table = RIVAL_TEAMS.map(rival => {
    let wins = 0, losses = 0, gf = 0, ga = 0;
    for (let game = 1; game <= 28; game++) {
      // Each rival plays a "league average" schedule — opponent strength
      // drawn from the full league pool (other rivals + your team).
      const oppPool = RIVAL_TEAMS.filter(r => r.name !== rival.name).map(r => r.strength).concat([teamOverall() || 80]);
      const oppStrength = oppPool[Math.floor(Math.random() * oppPool.length)];
      const winChance = (rival.strength - oppStrength) * 1.2 + 50;
      const isWin = Math.random() * 100 < Math.min(95, Math.max(5, winChance));
      const gameGF = isWin ? Math.floor(Math.random() * 4) + 2 : Math.floor(Math.random() * 3) + 1;
      const gameGA = isWin ? Math.max(0, gameGF - Math.floor(Math.random() * 2) - 1) : gameGF + Math.floor(Math.random() * 2) + 1;
      if (isWin) wins++; else losses++;
      gf += gameGF; ga += gameGA;
    }
    return {
      name: rival.name,
      color: rival.color,
      strength: rival.strength,
      wins, losses, gf, ga,
      points: wins * 2,
      isYou: false
    };
  });

  table.push({
    name: teamName,
    color: "#00ccff",
    strength: calculateTeamStrength(),
    wins: yourRecord.wins,
    losses: yourRecord.losses,
    gf: yourRecord.gf,
    ga: yourRecord.ga,
    points: yourRecord.wins * 2,
    isYou: true
  });

  table.sort((a, b) => b.points - a.points || (b.gf - b.ga) - (a.gf - a.ga));
  leagueStandings = table;
  renderStandings();
}

function renderStandings() {
  const container = document.getElementById("standingsResults");
  if (!leagueStandings) {
    container.innerHTML = "Simulate a season to generate league standings!";
    return;
  }

  let html = `<strong style="color:#ffd700; font-size:1.2em;">🏒 BMHL Standings</strong><br><br>`;
  html += `<table class="standings-table"><thead><tr>
    <th>#</th><th>Team</th><th>W</th><th>L</th><th>PTS</th><th>Diff</th>
  </tr></thead><tbody>`;

  leagueStandings.forEach((t, i) => {
    const diff = t.gf - t.ga;
    const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
    const rowClass = t.isYou ? "you-row" : "";
    const playoffCutoff = i < 4 ? "clinched" : "";
    html += `<tr class="${rowClass} ${playoffCutoff}">
      <td class="rank-cell">${i + 1}</td>
      <td>${t.name}</td>
      <td>${t.wins}</td>
      <td>${t.losses}</td>
      <td><strong>${t.points}</strong></td>
      <td>${diffStr}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  html += `<br><small style="color:#666;">✓ = top 4, clinched a playoff berth</small>`;
  container.innerHTML = html;
}

function switchSidebarTab(tab) {
  activeSidebarTab = tab;
  const teamBtn = document.getElementById("tabBtnTeam");
  const standingsBtn = document.getElementById("tabBtnStandings");
  const teamPanel = document.getElementById("seasonResults");
  const standingsPanel = document.getElementById("standingsResults");

  if (tab === 'team') {
    teamBtn.classList.add('active');
    standingsBtn.classList.remove('active');
    teamPanel.style.display = 'block';
    standingsPanel.style.display = 'none';
  } else {
    standingsBtn.classList.add('active');
    teamBtn.classList.remove('active');
    standingsPanel.style.display = 'block';
    teamPanel.style.display = 'none';
    renderStandings();
  }
}

// Simulates a single best-of-7 series between two named teams using their
// strength ratings. Returns the winner, final series score, and an HTML log.
// `team1` is always "you" from a perspective standpoint when isYou1 is true —
// used only to decide which side's strength uses your live roster numbers.
// If either team is you, onYourGame(goalsFor, goalsAgainst, didYouWin) fires
// once per game so playoff stats can be tallied.
function simulateSeriesBetween(team1, team2, onYourGame) {
  const strength1 = team1.isYou ? calculateTeamStrength() : team1.strength;
  const strength2 = team2.isYou ? calculateTeamStrength() : team2.strength;
  let wins1 = 0, wins2 = 0;
  let html = '';
  for (let game = 1; game <= 7; game++) {
    const gap = strength1 - strength2;
    const winChance = Math.min(92, Math.max(8, 50 + gap * 1.8));
    const team1Wins = Math.random() * 100 < winChance;
    if (team1Wins) wins1++; else wins2++;

    const winnerGoals = Math.floor(Math.random() * 4) + 2;
    const loserGoals = Math.max(0, winnerGoals - Math.floor(Math.random() * 3) - 1);
    const g1 = team1Wins ? winnerGoals : loserGoals;
    const g2 = team1Wins ? loserGoals : winnerGoals;

    html += `&nbsp;&nbsp;Game ${game}: <span style="color:${team1Wins ? '#00ffcc' : '#ff6666'};">${g1}-${g2}</span> &nbsp;<small style="color:#888;">(${wins1}-${wins2})</small><br>`;

    if (onYourGame) {
      if (team1.isYou) onYourGame(g1, g2, team1Wins);
      else if (team2.isYou) onYourGame(g2, g1, !team1Wins);
    }

    if (wins1 >= 4 || wins2 >= 4) break;
  }
  const winner = wins1 >= 4 ? team1 : team2;
  const loser = wins1 >= 4 ? team2 : team1;
  const winnerScore = wins1 >= 4 ? wins1 : wins2;
  const loserScore = wins1 >= 4 ? wins2 : wins1;
  return { winner, loser, winnerScore, loserScore, html };
}

function simulatePlayoffs() {
  if (!leagueStandings) {
    return alert("Simulate a season first to set the playoff seeding!");
  }

  // ---- Set up playoff stat tracking for your roster ----
  playoffStats = {};
  const skaters = Object.values(lines).flat().filter(p => p && !["G","GK"].includes(p.position));
  const goalies = (lines.goalies || []).filter(Boolean);
  [...skaters, ...goalies].forEach(p => {
    playoffStats[p.name] = ["G","GK"].includes(p.position)
      ? { wins: 0, losses: 0, saves: 0, shutouts: 0, gaPlayoffs: 0, gamesStarted: 0 }
      : { goals: 0, assists: 0, points: 0 };
  });

  function pickScorer() {
    if (skaters.length === 0) return null;
    const weights = skaters.map(p => p.rating - 60);
    const total = weights.reduce((a, b) => a + b, 0);
    let rand = Math.random() * total;
    for (let i = 0; i < skaters.length; i++) {
      rand -= weights[i];
      if (rand <= 0) return skaters[i];
    }
    return skaters[skaters.length - 1];
  }

  function pickStartingGoalie() {
    if (goalies.length === 0) return null;
    if (goalies.length === 1) return goalies[0];
    const [g1, g2] = goalies;
    const ratingGap = g1.rating - g2.rating;
    const g1StartChance = Math.min(0.85, Math.max(0.5, 0.65 + ratingGap * 0.015));
    return Math.random() < g1StartChance ? g1 : g2;
  }

  // Tallies goals/assists for your skaters and win/loss/saves for whichever
  // goalie "started" that game, for a single playoff game you were part of.
  function trackYourGame(goalsFor, goalsAgainst, didYouWin) {
    for (let g = 0; g < goalsFor; g++) {
      const scorer = pickScorer();
      if (!scorer) continue;
      const stats = playoffStats[scorer.name];
      stats.goals++;
      // ~55% chance the goal also generates a tracked assist from a teammate
      if (Math.random() < 0.55 && skaters.length > 1) {
        let assister = pickScorer();
        let guard = 0;
        while (assister && assister.name === scorer.name && guard < 5) { assister = pickScorer(); guard++; }
        if (assister && assister.name !== scorer.name) playoffStats[assister.name].assists++;
      }
      stats.points = stats.goals + stats.assists;
    }
    const startingGoalie = pickStartingGoalie();
    if (startingGoalie) {
      const gStats = playoffStats[startingGoalie.name];
      gStats.gamesStarted++;
      if (didYouWin) gStats.wins++; else gStats.losses++;
      gStats.gaPlayoffs += goalsAgainst;
      gStats.saves += Math.floor(Math.random() * 16) + 20; // 20-35 saves
      if (goalsAgainst === 0) gStats.shutouts++;
    }
  }

  // Top 8 seeds from the real standings table (all teams in the league — there are exactly 8)
  const seeds = leagueStandings.slice(0, 8).map((t, i) => ({ ...t, seed: i + 1 }));
  const yourSeed = seeds.find(s => s.isYou);

  let html = `<br><br><strong style="color:#ffd700; font-size:1.2em;">🏒 BMHL PLAYOFFS 🏒</strong><br>`;
  html += `<small style="color:#aaa;">You enter as the #${yourSeed.seed} seed</small><br><br>`;

  function renderMatchupHeader(roundName, a, b) {
    const aLabel = `${a.isYou ? '⭐ ' : ''}#${a.seed} ${a.name}`;
    const bLabel = `${b.isYou ? '⭐ ' : ''}#${b.seed} ${b.name}`;
    return `<strong style="color:#ffd700;">${roundName}: ${aLabel} vs ${bLabel}</strong><br>`;
  }

  // ---- Quarterfinals: 1v8, 4v5, 2v7, 3v6 ----
  const qfPairs = [[0,7],[3,4],[1,6],[2,5]];
  const qfResults = qfPairs.map(([ia, ib]) => {
    const a = seeds[ia], b = seeds[ib];
    return { a, b, result: simulateSeriesBetween(a, b, trackYourGame) };
  });

  html += `<u>Quarterfinals (Best of 7)</u><br><br>`;
  qfResults.forEach(({ a, b, result }) => {
    html += renderMatchupHeader("QF", a, b);
    html += result.html;
    html += `<span style="color:${result.winner.isYou ? '#00ffcc' : '#aaa'};">#${result.winner.seed} ${result.winner.name} wins ${result.winnerScore}-${result.loserScore}</span><br><br>`;
  });

  const yourQfExit = yourSeed && qfResults.some(r => (r.a.isYou || r.b.isYou) && r.result.loser.isYou);
  if (yourQfExit) {
    html += `<span style="color:#ff6666; font-size:1.1em;">Eliminated in the Quarterfinals — Better luck next year!</span><br><br>`;
  }

  // ---- Semifinals ----
  const sfPairs = [[qfResults[0], qfResults[1]], [qfResults[2], qfResults[3]]];
  const sfResults = sfPairs.map(([qf1, qf2]) => {
    const a = qf1.result.winner, b = qf2.result.winner;
    return { a, b, result: simulateSeriesBetween(a, b, trackYourGame) };
  });

  html += `<u>Semifinals (Best of 7)</u><br><br>`;
  sfResults.forEach(({ a, b, result }) => {
    html += renderMatchupHeader("SF", a, b);
    html += result.html;
    html += `<span style="color:${result.winner.isYou ? '#00ffcc' : '#aaa'};">#${result.winner.seed} ${result.winner.name} wins ${result.winnerScore}-${result.loserScore}</span><br><br>`;
  });

  const yourSfExit = !yourQfExit && yourSeed && sfResults.some(r => (r.a.isYou || r.b.isYou) && r.result.loser.isYou);
  if (yourSfExit) {
    html += `<span style="color:#ff6666; font-size:1.1em;">Eliminated in the Semifinals — Better luck next year!</span><br><br>`;
  }

  // ---- Final ----
  const finalA = sfResults[0].result.winner;
  const finalB = sfResults[1].result.winner;
  const finalResult = simulateSeriesBetween(finalA, finalB, trackYourGame);

  html += `<u>🏆 BMHL FINALS (Best of 7)</u><br><br>`;
  html += renderMatchupHeader("Final", finalA, finalB);
  html += finalResult.html;
  html += `<span style="color:${finalResult.winner.isYou ? '#ffd700' : '#aaa'};">#${finalResult.winner.seed} ${finalResult.winner.name} wins ${finalResult.winnerScore}-${finalResult.loserScore}</span><br><br>`;

  const yourFinalExit = !yourQfExit && !yourSfExit && yourSeed && finalResult.loser.isYou;
  if (finalResult.winner.isYou) {
    html += `<span style="color:#ffd700; font-size:1.5em;">🏆 BMHL CHAMPIONS! 🏆</span>`;
  } else if (yourFinalExit) {
    html += `<span style="color:#ff6666; font-size:1.1em;">Lost in the Finals — so close! Better luck next year.</span>`;
  } else {
    html += `<span style="color:#aaa;">#${finalResult.winner.seed} ${finalResult.winner.name} are your BMHL Champions.</span>`;
  }

  // ---- Playoff stat leaders summary ----
  html += renderPlayoffStatsSummary();

  document.getElementById("seasonResults").innerHTML += html;
  document.getElementById("playoffsBtn").style.display = "none";
  renderRoster();
  renderLines();
}

function renderPlayoffStatsSummary() {
  if (!playoffStats) return '';

  const topSkaters = Object.keys(playoffStats)
    .filter(name => { const p = myTeam.find(pl => pl.name === name); return p && !["G","GK"].includes(p.position); })
    .map(name => ({ name, ...playoffStats[name] }))
    .filter(s => s.points > 0)
    .sort((a, b) => b.points - a.points)
    .slice(0, 4);

  const goalieList = Object.keys(playoffStats)
    .filter(name => { const p = myTeam.find(pl => pl.name === name); return p && ["G","GK"].includes(p.position); })
    .map(name => ({ name, ...playoffStats[name] }))
    .filter(g => g.gamesStarted > 0);

  let html = `<br><strong style="color:#ffd700; font-size:1.1em;">📊 Playoff Stat Leaders</strong><br><br>`;

  if (topSkaters.length > 0) {
    html += `<strong>Top Scorers:</strong><br>`;
    topSkaters.forEach(s => html += `${s.name}: <strong>${s.goals}G ${s.assists}A</strong> (${s.points} pts)<br>`);
  }

  if (goalieList.length > 0) {
    html += `<br><strong>Goalies:</strong><br>`;
    goalieList.forEach(g => {
      const svPct = (g.saves + g.gaPlayoffs) > 0 ? ((g.saves / (g.saves + g.gaPlayoffs)) * 100).toFixed(1) : "0.0";
      html += `${g.name}: <strong>${g.wins}-${g.losses}</strong> • ${g.saves} SV • ${svPct}% SV% • ${g.shutouts} SO<br>`;
    });
  }

  return html;
}

// ================== ASSIGN MODAL — LW/C/RW/D labels ==================
function showAssignModal(index) {
  selectedPlayerIndex = index;
  const player = myTeam[index];
  document.getElementById("modalPlayerName").textContent = `Assign ${getDisplayName(player)} (${player.position})`;

  const optionsDiv = document.getElementById("slotOptions");
  optionsDiv.innerHTML = "";

  const counts = countAssignedByType();
  const isGoalie = ["G","GK"].includes(player.position);
  const isForward = ["LW","RW","FWD","C"].includes(player.position);
  const isDefender = ["D","LD","RD"].includes(player.position);

  if (isGoalie) {
    if (counts.goalies >= MAX_GOALIES) {
      optionsDiv.innerHTML = "<p style='color:#ff6666;'>Goalie slots are full!</p>";
    } else {
      for (let i = 0; i < 2; i++) {
        if (!lines.goalies[i]) {
          const btn = document.createElement("button");
          btn.textContent = `Goalie Slot ${i + 1}`;
          btn.onclick = () => assignToSlot('goalies', i);
          optionsDiv.appendChild(btn);
        }
      }
    }
  } else if (isForward) {
    if (counts.forwards >= MAX_FORWARDS) {
      optionsDiv.innerHTML = "<p style='color:#ff6666;'>All Forward slots are full!</p>";
    } else {
      // Slot indices 0=LW, 1=C, 2=RW within each line
      ["line1", "line2"].forEach(lineKey => {
        const current = lines[lineKey] || [];
        [0, 1, 2].forEach(i => {
          if (!current[i]) {
            const btn = document.createElement("button");
            btn.textContent = `${lineKey === "line1" ? "Line 1" : "Line 2"} — ${LINE_POS_LABELS[i]}`;
            btn.onclick = () => assignToSlot(lineKey, i);
            optionsDiv.appendChild(btn);
          }
        });
      });
    }
  } else if (isDefender) {
    if (counts.defenders >= MAX_DEFENDERS) {
      optionsDiv.innerHTML = "<p style='color:#ff6666;'>All Defense slots are full!</p>";
    } else {
      ["line1", "line2"].forEach(lineKey => {
        const current = lines[lineKey] || [];
        if (!current[3]) {
          const btn = document.createElement("button");
          btn.textContent = `${lineKey === "line1" ? "Line 1" : "Line 2"} — D`;
          btn.onclick = () => assignToSlot(lineKey, 3);
          optionsDiv.appendChild(btn);
        }
      });
    }
  }

  document.getElementById("assignModal").style.display = "flex";
}

function assignToSlot(lineKey, slotIndex) {
  const player = myTeam[selectedPlayerIndex];
  const alreadyUsed = Object.values(lines).flat().some(p => p && p.name === player.name);
  if (alreadyUsed) { alert("This player is already assigned!"); closeModal(); return; }
  if (!lines[lineKey]) lines[lineKey] = [];
  lines[lineKey][slotIndex] = player;
  closeModal();
  renderRoster();
  renderLines();
}

function closeModal() {
  document.getElementById("assignModal").style.display = "none";
  selectedPlayerIndex = null;
}

function shareTeam() {
  if (myTeam.length === 0) return alert("Build a team first!");
  const data = { teamName, myTeam, lines };
  const encoded = btoa(JSON.stringify(data));
  document.getElementById("shareCode").value = encoded;
  document.getElementById("shareModal").style.display = "flex";
}

function copyShareCode() {
  const ta = document.getElementById("shareCode");
  ta.select();
  document.execCommand("copy");
  alert("✅ Code copied to clipboard!");
}

function closeShareModal() { document.getElementById("shareModal").style.display = "none"; }
function showLoadModal() { document.getElementById("loadModal").style.display = "flex"; }
function closeLoadModal() { document.getElementById("loadModal").style.display = "none"; }

function loadTeam() {
  const code = document.getElementById("loadCode").value.trim();
  if (!code) return alert("Paste a code first!");
  try {
    const data = JSON.parse(atob(code));
    if (confirm(`Load team "${data.teamName}"?`)) {
      teamName = data.teamName || "Your Dynasty";
      document.getElementById("teamNameDisplay").textContent = teamName;
      myTeam = data.myTeam || [];
      lines = data.lines || { line1: [], line2: [], goalies: [] };
      seasonStats = {};
      leagueStandings = null;
      playoffStats = null;
      document.getElementById("playoffsBtn").style.display = "none";
      document.getElementById("seasonResults").innerHTML = "Build your roster and simulate the season!";
      document.getElementById("standingsResults").innerHTML = "Simulate a season to generate league standings!";
      switchSidebarTab('team');
      renderRoster();
      renderLines();
      closeLoadModal();
      alert("✅ Team loaded successfully!");
    }
  } catch(e) { alert("❌ Invalid code!"); }
}

function setTeamName() {
  const input = document.getElementById("teamNameInput").value.trim();
  if (input) {
    teamName = input;
    document.getElementById("teamNameDisplay").textContent = teamName;
  }
}

function clearRoster() {
  if (confirm("Clear entire roster and reset season?")) {
    myTeam = [];
    lines = { line1: [], line2: [], goalies: [] };
    seasonStats = {};
    leagueStandings = null;
    playoffStats = null;
    rosterSortMode = 'draft';
    document.getElementById("playoffsBtn").style.display = "none";
    renderRoster();
    renderLines();
    document.getElementById("seasonResults").innerHTML = "Build your roster and simulate the season!";
    document.getElementById("standingsResults").innerHTML = "Simulate a season to generate league standings!";
    switchSidebarTab('team');
  }
}

function teamOverall() {
  if (myTeam.length === 0) return 0;
  return Math.round(myTeam.reduce((sum, p) => sum + p.rating, 0) / myTeam.length);
}

// ================== RENDERING ==================
// Position group used for sorting/grouping — forwards before defense before goalies
function positionSortRank(position) {
  if (["LW","RW","FWD","C"].includes(position)) return 0;
  if (["D","LD","RD"].includes(position)) return 1;
  if (["G","GK"].includes(position)) return 2;
  return 3;
}

function setRosterSort(mode) {
  rosterSortMode = mode;
  renderRoster();
}

function renderRoster() {
  const teamDiv = document.getElementById("team");
  const ovr = myTeam.length > 0 ? ` — <span style="color:#ffd700;">${teamOverall()} OVR</span>` : "";

  const sortLabels = { draft: "Draft Order", ovr: "OVR", position: "Position", team: "Team" };
  const sortButtons = Object.keys(sortLabels).map(mode => `
    <button class="sort-btn${rosterSortMode === mode ? ' active' : ''}" onclick="setRosterSort('${mode}')">${sortLabels[mode]}</button>
  `).join('');

  teamDiv.innerHTML = `
    <h3 style="color:var(--primary);">Roster: ${myTeam.length}/${ROSTER_MAX} (Click to assign)${ovr}</h3>
    <div class="sort-controls">
      <span class="sort-label">Sort by:</span>${sortButtons}
    </div>
  `;

  // Sort a copy for display only — myTeam's underlying order/indices never change,
  // so showAssignModal still receives the correct true index for each player.
  const displayList = myTeam.map((player, trueIndex) => ({ player, trueIndex }));
  if (rosterSortMode === 'ovr') {
    displayList.sort((a, b) => b.player.rating - a.player.rating);
  } else if (rosterSortMode === 'position') {
    displayList.sort((a, b) => positionSortRank(a.player.position) - positionSortRank(b.player.position) || b.player.rating - a.player.rating);
  } else if (rosterSortMode === 'team') {
    displayList.sort((a, b) => a.player.team.localeCompare(b.player.team) || b.player.rating - a.player.rating);
  }
  // 'draft' mode: leave in original myTeam order

  displayList.forEach(({ player, trueIndex }) => {
    const div = document.createElement("div");
    div.className = "player";
    div.onclick = () => showAssignModal(trueIndex);
    let statHTML = '';
    const stats = seasonStats[player.name];
    if (stats) {
      if (["G","GK"].includes(player.position)) {
        statHTML = `<div class="stats">${stats.wins ?? 0}-${stats.losses ?? 0} • ${stats.saves ?? 0} SV • SV%: ${stats.svPct} • SO: ${stats.shutouts} • GAA: ${stats.gaa}</div>`;
      } else {
        statHTML = `<div class="stats">${stats.goals}G ${stats.assists}A (${stats.points} pts)</div>`;
      }
    }
    div.innerHTML = `
      <img src="${player.image}" alt="${player.name}" onerror="this.src='https://via.placeholder.com/60/00ccff/000?text=${player.name[0]}'">
      <div style="flex:1; text-align:left;">
        <strong>${getDisplayName(player)}</strong><br>
        ${player.position} — ${player.rating} OVR<br>
        <small>${player.team}</small>
        ${statHTML}
        ${formatPlayoffStatLine(player)}
      </div>
    `;
    teamDiv.appendChild(div);
  });
}

function lineOverall(lineKey) {
  const players = (lines[lineKey] || []).filter(Boolean);
  if (players.length === 0) return null;
  return Math.round(players.reduce((sum, p) => sum + p.rating, 0) / players.length);
}

function renderLine(lineKey, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  let players = lines[lineKey] || [];
  const ovr = lineOverall(lineKey);
  const lineEl = containerId === "line1-formation" ? document.getElementById("line1") : document.getElementById("line2");
  const h3 = lineEl ? lineEl.querySelector("h3") : null;
  const lineNum = lineKey === "line1" ? "1" : "2";
  if (h3) h3.innerHTML = `🔥 LINE ${lineNum} (4 Players)${ovr ? ` <span style="color:#ffd700; font-size:0.85em;">| ${ovr} OVR</span>` : ""}`;
  for (let i = 0; i < 4; i++) {
    const slot = document.createElement("div");
    slot.className = "slot" + (players[i] ? " filled" : "");
    const posLabel = LINE_POS_LABELS[i];
    if (players[i]) {
      const p = players[i];
      const stats = seasonStats[p.name] || {};
      let statHTML = '';
      if (stats.goals !== undefined) statHTML = `<div class="stats">${stats.goals}G ${stats.assists}A</div>`;
      else if (stats.svPct) statHTML = `<div class="stats">${stats.wins ?? 0}-${stats.losses ?? 0} • ${stats.saves ?? 0} SV</div>`;
      const playoffStatHTML = formatPlayoffStatLine(p);
      slot.innerHTML = `
        <div class="pos">${posLabel}</div>
        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/52/00ccff/000?text=${p.name[0]}'">
        <strong>${getDisplayName(p)}</strong><br>
        <small>${p.rating} OVR</small>
        ${statHTML}
        ${playoffStatHTML}
      `;
    } else {
      slot.innerHTML = `<div class="pos">${posLabel}</div><em style="color:#666;">Empty</em>`;
    }
    container.appendChild(slot);
  }
}

function renderGoalies() {
  const container = document.getElementById("goalies-formation");
  container.innerHTML = "";
  const players = lines.goalies || [];
  const ovr = lineOverall("goalies");
  const goalieEl = document.getElementById("goalies");
  const h3 = goalieEl ? goalieEl.querySelector("h3") : null;
  if (h3) h3.innerHTML = `🥅 GOALIES (2)${ovr ? ` <span style="color:#ffd700; font-size:0.85em;">| ${ovr} OVR</span>` : ""}`;
  for (let i = 0; i < 2; i++) {
    const slot = document.createElement("div");
    slot.className = "slot" + (players[i] ? " filled" : "");
    if (players[i]) {
      const p = players[i];
      const stats = seasonStats[p.name] || {};
      let statHTML = stats.svPct ? `<div class="stats">${stats.wins ?? 0}-${stats.losses ?? 0} • ${stats.saves ?? 0} SV<br>${stats.svPct}% • ${stats.shutouts} SO</div>` : '';
      const playoffStatHTML = formatPlayoffStatLine(p);
      slot.innerHTML = `
        <div class="pos">G</div>
        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/52/00ccff/000?text=${p.name[0]}'">
        <strong>${getDisplayName(p)}</strong><br>
        <small>${p.rating} OVR</small>
        ${statHTML}
        ${playoffStatHTML}
      `;
    } else {
      slot.innerHTML = `<div class="pos">G</div><em style="color:#666;">Empty</em>`;
    }
    container.appendChild(slot);
  }
}

function renderLines() {
  renderLine("line1", "line1-formation");
  renderLine("line2", "line2-formation");
  renderGoalies();
}

renderRoster();
renderLines();
</script>
